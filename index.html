<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solow Decomposition Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <script defer src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <main class="page">
      <header class="hero card">
        <p class="kicker">Solow Growth Accounting</p>
        <h1>Output Decomposition Dashboard</h1>
        <p class="subtitle">
          Explore output growth decomposition by labor, capital, and TFP across countries and industries.
        </p>
      </header>

      <section class="controls card">
        <label>
          Country
          <select id="countrySelect" aria-label="Select country"></select>
        </label>
        <label>
          Industry
          <select id="industrySelect" aria-label="Select industry"></select>
        </label>
        <fieldset class="mode-toggle">
          <legend>View</legend>
          <label>
            <input type="radio" name="mode" value="yoy" checked />
            YoY
          </label>
          <label>
            <input type="radio" name="mode" value="cumulative" />
            Cumulative
          </label>
        </fieldset>
      </section>

      <section class="card">
        <div class="chart-header">
          <div>
            <h2 id="chartTitle">Decomposition</h2>
            <p id="chartSubtitle"></p>
          </div>
          <div class="legend-chip-row">
            <span class="legend-chip labor">Labor</span>
            <span class="legend-chip capital">Capital</span>
            <span class="legend-chip tfp">TFP</span>
            <span class="legend-chip output">Output</span>
          </div>
        </div>
        <div id="mainChart" class="chart" role="img" aria-label="Main decomposition chart"></div>
      </section>

      <section class="metric-grid" id="metricGrid"></section>

      <section class="card review">
        <h2>Outputs Review</h2>
        <div class="review-grid" id="reviewGrid"></div>
      </section>
    </main>
  </body>
</html>
